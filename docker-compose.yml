name: cf-tunnels

x-casaos:
  architectures:
    - amd64
    - arm64
  main: cf-tunnels
  title:
    en_us: CF Tunnels
  description:
    en_us: Web UI for Cloudflare Tunnel and DNS management.
  port_map: "3000"
  scheme: http
  index: /

x-webui:
  service: cf-tunnels
  title: CF Tunnels
  description: Web UI for Cloudflare Tunnel and DNS management.
  scheme: http
  path: /
  web_ui_port: 3000
  container_port: 3000
  host_port: 3000

services:
  cf-tunnels:
    image: ghcr.io/iyouknow/cf-tunnels:latest
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: cf-tunnels
    network_mode: bridge
    ports:
      - "3000:3000"
    environment:
      TZ: UTC
      LISTEN_PORT: "3000"
      DATA_DIR: /app/data
      WEB_ROOT: /app/share/web
      CF_API_TOKEN: ${CF_API_TOKEN}
      CF_ACCOUNT_ID: ${CF_ACCOUNT_ID}
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      SESSION_SECRET: ${SESSION_SECRET:-}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
    stop_grace_period: 15s
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
    labels:
      org.opencontainers.image.title: "CF Tunnels"
      org.opencontainers.image.description: "Web UI for Cloudflare Tunnel and DNS management"
      cf-tunnels.webui.port: "3000"
      cf-tunnels.webui.scheme: "http"
      cf-tunnels.webui.path: "/"
